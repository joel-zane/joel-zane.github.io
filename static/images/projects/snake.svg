<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  
  <!-- TFT Screen frame -->
  <rect x="180" y="50" width="256" height="324" rx="8" fill="#222" stroke="#444" stroke-width="2"/>
  <!-- Screen area -->
  <rect x="195" y="70" width="224" height="280" fill="#000" stroke="#333" stroke-width="1"/>
  
  <!-- HUD -->
  <text x="210" y="95" font-family="monospace" font-size="14" fill="#fff">S:120 L:3</text>
  <text x="370" y="95" font-family="monospace" font-size="14" fill="#0f0">OK</text>
  
  <!-- Grid lines (subtle) -->
  <g stroke="#111" stroke-width="0.5" opacity="0.3">
    <line x1="195" y1="110" x2="419" y2="110"/>
    <line x1="195" y1="130" x2="419" y2="130"/>
    <line x1="195" y1="150" x2="419" y2="150"/>
    <line x1="195" y1="170" x2="419" y2="170"/>
    <line x1="195" y1="190" x2="419" y2="190"/>
    <line x1="195" y1="210" x2="419" y2="210"/>
    <line x1="195" y1="230" x2="419" y2="230"/>
    <line x1="195" y1="250" x2="419" y2="250"/>
    <line x1="195" y1="270" x2="419" y2="270"/>
    <line x1="195" y1="290" x2="419" y2="290"/>
    <line x1="195" y1="310" x2="419" y2="310"/>
    <line x1="195" y1="330" x2="419" y2="330"/>
    <line x1="229" y1="70" x2="229" y2="350"/>
    <line x1="263" y1="70" x2="263" y2="350"/>
    <line x1="297" y1="70" x2="297" y2="350"/>
    <line x1="331" y1="70" x2="331" y2="350"/>
    <line x1="365" y1="70" x2="365" y2="350"/>
    <line x1="399" y1="70" x2="399" y2="350"/>
  </g>
  
  <!-- Snake body (white segments) -->
  <rect x="247" y="192" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="231" y="192" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="215" y="192" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="215" y="208" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="215" y="224" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="231" y="224" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="247" y="224" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="263" y="224" width="16" height="16" fill="#ddd" rx="2"/>
  <rect x="263" y="208" width="16" height="16" fill="#ddd" rx="2"/>
  
  <!-- Snake head (yellow) -->
  <rect x="263" y="192" width="16" height="16" fill="#ff0" rx="2"/>
  
  <!-- Food (red) -->
  <rect x="347" y="152" width="16" height="16" fill="#f00" rx="2"/>
  
  <!-- MPU6500 board (right side) -->
  <rect x="500" y="140" width="180" height="120" rx="6" fill="#1a3a1a" stroke="#2a5a2a" stroke-width="2"/>
  <text x="540" y="175" font-family="monospace" font-size="11" fill="#4a4">MPU6500</text>
  <text x="530" y="195" font-family="monospace" font-size="10" fill="#6a6">GYRO + ACCEL</text>
  <!-- Chip -->
  <rect x="560" y="210" width="40" height="30" fill="#111" stroke="#333" stroke-width="1"/>
  <!-- Pins -->
  <g fill="#c90">
    <rect x="520" y="255" width="4" height="8"/>
    <rect x="535" y="255" width="4" height="8"/>
    <rect x="550" y="255" width="4" height="8"/>
    <rect x="565" y="255" width="4" height="8"/>
    <rect x="580" y="255" width="4" height="8"/>
    <rect x="595" y="255" width="4" height="8"/>
    <rect x="610" y="255" width="4" height="8"/>
    <rect x="625" y="255" width="4" height="8"/>
    <rect x="640" y="255" width="4" height="8"/>
    <rect x="655" y="255" width="4" height="8"/>
  </g>
  <!-- Labels -->
  <text x="516" y="275" font-family="monospace" font-size="7" fill="#888">VCC GND SCL SDA EDA ECL AD0 INT NCS FSYNC</text>
  
  <!-- Jumper wires -->
  <path d="M 435 200 Q 460 180 500 190" stroke="#f44" stroke-width="2" fill="none"/>
  <path d="M 435 210 Q 460 220 500 200" stroke="#44f" stroke-width="2" fill="none"/>
  <path d="M 435 220 Q 460 250 500 210" stroke="#4f4" stroke-width="2" fill="none"/>
  <path d="M 435 230 Q 460 260 500 220" stroke="#ff0" stroke-width="2" fill="none"/>
  
  <!-- Title -->
  <text x="500" y="60" font-family="sans-serif" font-size="28" fill="#fff" font-weight="bold">Gesture Snake</text>
  <text x="500" y="90" font-family="sans-serif" font-size="16" fill="#888">STM32G474 + MPU6500 + ST7735</text>
  
  <!-- Arrow hints -->
  <text x="540" y="340" font-family="sans-serif" font-size="14" fill="#4ade80">↑ 倾斜控制方向</text>
  <text x="540" y="365" font-family="sans-serif" font-size="14" fill="#f59e0b">↻ 摇一摇重置</text>
  
  <!-- Nucleo board hint (bottom left) -->
  <rect x="180" y="385" width="120" height="40" rx="4" fill="#0a3a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="195" y="410" font-family="monospace" font-size="10" fill="#4a4">NUCLEO-G474RE</text>
</svg>
