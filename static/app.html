<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>一期一会</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="stylesheet" href="/css/APlayer.min.css?v=2">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0f0f0f}
#frame{width:100%;height:100%;border:none;display:block}
.music-toggle{position:fixed!important;right:20px!important;bottom:20px!important;width:52px!important;height:52px!important;border-radius:50%!important;background:#a8b4c0!important;color:#0d0d0d!important;border:none!important;cursor:pointer!important;z-index:99999!important;font-size:24px!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:0 2px 16px rgba(168,180,192,.4)!important;transition:all .3s!important;visibility:visible!important;opacity:1!important}
.music-toggle:hover{transform:scale(1.1)!important;box-shadow:0 4px 24px rgba(168,180,192,.6)!important}
.music-toggle.active{background:#161616!important;color:#a8b4c0!important;border:2px solid #a8b4c0!important}
.music-panel{position:fixed!important;right:20px;bottom:80px;width:360px;max-height:500px;background:#161616;border:1px solid #333;border-radius:12px;z-index:99998;display:none;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.music-panel.open{display:block}
.music-panel-header{padding:12px 16px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.music-panel-header h3{color:#a8b4c0;font-size:.95rem;margin:0}
.music-panel-header .close-btn{background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:0 4px}
.music-panel-header .close-btn:hover{color:#fff}
.music-panel meting-js{display:block}
.music-panel .aplayer{background:#161616!important;border:0!important;box-shadow:none!important;margin:0!important}
.music-panel .aplayer .aplayer-info{border-bottom:1px solid #222!important}
.music-panel .aplayer .aplayer-info .aplayer-music .aplayer-title{color:#eee!important}
.music-panel .aplayer .aplayer-info .aplayer-music .aplayer-author{color:#888!important}
.music-panel .aplayer .aplayer-list ol li{border-bottom:1px solid #222!important}
.music-panel .aplayer .aplayer-list ol li:hover{background:#1e1e1e!important}
.music-panel .aplayer .aplayer-list ol li.aplayer-list-light{background:#1e1e1e!important}
.music-panel .aplayer .aplayer-list ol li .aplayer-list-title{color:#ccc!important}
.music-panel .aplayer .aplayer-list ol li .aplayer-list-author{color:#666!important}
.music-panel .aplayer .aplayer-controller .aplayer-bar-wrap .aplayer-bar{background:#333!important}
.music-panel .aplayer .aplayer-controller .aplayer-bar-wrap .aplayer-bar .aplayer-played{background:#a8b4c0!important}
.music-panel .aplayer .aplayer-controller .aplayer-time{color:#888!important}
.music-panel .aplayer .aplayer-icon{color:#a8b4c0!important}
@media(max-width:480px){
  .music-panel{right:8px;left:8px;width:auto!important;bottom:75px;max-height:60vh}
  .music-toggle{right:12px!important;bottom:12px!important;width:48px!important;height:48px!important;font-size:22px!important}
}
</style>
</head>
<body>

<iframe id="frame" style="width:100%;height:calc(100vh - 0px);border:none;display:block"></iframe>

<button class="music-toggle" id="music-toggle" onclick="toggleMusic()" title="音乐播放器">🎵</button>
<div class="music-panel" id="music-panel">
  <div class="music-panel-header">
    <h3>🎵 我的歌单</h3>
    <button class="close-btn" onclick="toggleMusic()">✕</button>
  </div>
  <meting-js
    server="tencent"
    type="playlist"
    id="9609530515"
    mutex="true"
    preload="auto"
    volume="0.7"
    theme="#a8b4c0"
    list-folded="false"
    list-max-height="340px">
  </meting-js>
</div>

<script src="/js/APlayer.min.js?v=2"></script>
<script src="/js/Meting.min.js?v=2"></script>
<script>
// === 音乐面板开关 ===
function toggleMusic(){
  var panel=document.getElementById('music-panel');
  var btn=document.getElementById('music-toggle');
  var isOpen=panel.classList.toggle('open');
  btn.classList.toggle('active',isOpen);
  btn.textContent=isOpen?'✕':'🎵';
  try{localStorage.setItem('musicPanelOpen',isOpen?'1':'0')}catch(e){}
}

// 恢复面板状态
(function(){
  try{
    if(localStorage.getItem('musicPanelOpen')==='1'){
      var panel=document.getElementById('music-panel');
      var btn=document.getElementById('music-toggle');
      panel.classList.add('open');
      btn.classList.add('active');
      btn.textContent='✕';
    }
  }catch(e){}
})();

// === iframe 导航 ===
var frame = document.getElementById('frame');
var initialPath = location.pathname + location.search + location.hash;

// 加载初始页面（/i/ 前缀 → 真实页面）
frame.src = '/i' + initialPath;

// iframe 加载完成 → 同步 URL + 拦截内部链接
frame.onload = function() {
  try {
    var iframePath = frame.contentWindow.location.pathname;
    // 去掉 /i/ 前缀得到真实路径
    var realPath = iframePath.replace(/^\/i/, '') || '/';
    var search = frame.contentWindow.location.search || '';
    var fullPath = realPath + search;
    if (fullPath !== (location.pathname + location.search)) {
      history.pushState({path: fullPath}, '', fullPath);
    }
    // 更新 title
    var iframeTitle = frame.contentDocument.title;
    if (iframeTitle) document.title = iframeTitle;

    // 拦截 iframe 内所有内部链接，加 /i/ 前缀
    var iframeDoc = frame.contentDocument || frame.contentWindow.document;
    iframeDoc.addEventListener('click', function(e) {
      var a = e.target.closest('a');
      if (!a || !a.href) return;
      if (a.hostname !== location.hostname) return;
      if (a.target === '_blank') return;
      // 内部链接：改用 /i/ 前缀在 iframe 内导航
      e.preventDefault();
      var path = a.pathname + a.search + a.hash;
      frame.src = '/i' + path;
    }, true);
  } catch(e) {}
};

// 浏览器前进/后退 → 导航 iframe
window.addEventListener('popstate', function(e) {
  var path = (e.state && e.state.path) || location.pathname + location.search;
  frame.src = '/i' + path;
});

// 初始化 history
history.replaceState({path: initialPath}, '', initialPath);
</script>

<!-- Service Worker: 自卸载清除旧缓存 -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistration().then(function(reg) {
    if (reg) reg.unregister();
  });
  if (window.caches) caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})});
}
</script>
</body>
</html>
