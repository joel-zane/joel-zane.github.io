baseURL = "https://joel-zane.github.io/"
defaultContentLanguage = "zh"
title = "一期一会"
theme = "archie"
copyright = "© 2026 Joel Zane"

[markup.goldmark.renderer]
  unsafe = true

[params]
  mode = "auto"
  useCDN = false
  subtitle = "一个关于AI、技术与生活的个人博客"
  description = "Joel Zane 的个人博客，记录 AI、技术与生活的点滴。"
  author = "Joel Zane"
  mathjax = false
  katex = false
  busuanzi = true
  enablePWA = true

# Social Links
[[params.social]]
  name = "GitHub"
  icon = "github"
  url = "https://github.com/joel-zane"

[[params.social]]
  name = "Email"
  icon = "mail"
  url = "mailto:3151798198@qq.com"

# 多语言配置
[languages]
  [languages.zh]
    label = "中文"
    title = "一期一会"
    weight = 1
    [languages.zh.params]
      subtitle = "一个关于AI、技术与生活的个人博客"
  [languages.en]
    label = "English"
    title = "Yi Qi Yi Hui"
    weight = 2
    [languages.en.params]
      subtitle = "A personal blog about AI, tech and life"

