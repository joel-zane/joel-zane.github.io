{{ define "main" }}
<div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ if .Params.description }}<p>{{ .Params.description }}</p>{{ end }}
</div>

{{ $timeline := .Site.Data.timeline }}
{{ if $timeline }}
<div class="timeline">
    {{ range $timeline }}
    <div class="timeline-item">
        <div class="year">{{ .year }}</div>
        <h3>{{ .title }}</h3>
        <p>{{ .description }}</p>
    </div>
    {{ end }}
</div>
{{ else }}
{{ .Content }}
{{ end }}
{{ end }}
