{{ define "main" }}
<div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ if .Params.description }}<p>{{ .Params.description }}</p>{{ end }}
</div>

{{ $tools := .Site.Data.tools }}
{{ if $tools }}
<div class="tools-grid">
    {{ range $tools }}
    <div class="tool-card">
        <h3>{{ .name }}</h3>
        <p>{{ .description }}</p>
        {{ if .url }}<a href="{{ .url }}" class="view-all" style="display:inline-block;margin-top:8px;font-size:0.82rem;">访问 →</a>{{ end }}
    </div>
    {{ end }}
</div>
{{ else }}
{{ .Content }}
{{ end }}
{{ end }}
