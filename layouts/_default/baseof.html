    <!-- Theme Toggle Script -->
    <script>
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcon(next);
    }
    function updateThemeIcon(theme) {
        const btn = document.querySelector('.theme-toggle');
        if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
    }
    (function() {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = saved || (prefersDark ? 'dark' : 'dark'); // default dark
        document.documentElement.setAttribute('data-theme', theme);
        updateThemeIcon(theme);
    })();
    </script>

<button class="music-toggle" id="music-toggle" onclick="toggleMusic()" title="音乐播放器">🎵</button>
<div class="music-panel" id="music-panel">
  <div class="music-panel-header">
    <h3>🎵 我的歌单</h3>
    <button class="close-btn" onclick="toggleMusic()">✕</button>
  </div>
  <div class="playlist-tabs" id="playlist-tabs">
    <button class="pl-tab active" data-id="9609530515">🎹 纯音乐</button>
    <button class="pl-tab" data-id="9609530462">🎤 华语</button>
    <button class="pl-tab" data-id="9609530483">🇯🇵 日语</button>
    <button class="pl-tab" data-id="9609530446">🎧 Hip-Hop</button>
  </div>
  <div id="meting-container"></div>
</div>
<style>
.playlist-tabs{display:flex;gap:0;border-bottom:1px solid #333;overflow-x:auto;scrollbar-width:none}
.playlist-tabs::-webkit-scrollbar{display:none}
.pl-tab{flex:1;min-width:0;padding:8px 4px;background:none;border:none;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;border-bottom:2px solid transparent}
.pl-tab:hover{color:#ccc}
.pl-tab.active{color:#a8b4c0;border-bottom-color:#a8b4c0}
</style>
<script>
// 音乐面板开关
function toggleMusic(){
  var panel=document.getElementById('music-panel');
  var btn=document.getElementById('music-toggle');
  var isOpen=panel.classList.toggle('open');
  btn.classList.toggle('active',isOpen);
  btn.textContent=isOpen?'✕':'🎵';
  try{localStorage.setItem('musicPanelOpen',isOpen?'1':'0')}catch(e){}
}

// 恢复面板状态
(function(){
  try{
    if(localStorage.getItem('musicPanelOpen')==='1'){
      var panel=document.getElementById('music-panel');
      var btn=document.getElementById('music-toggle');
      panel.classList.add('open');
      btn.classList.add('active');
      btn.textContent='✕';
    }
  }catch(e){}
})();

// === 歌单切换 ===
var playlists=[
  {id:'9609530515',name:'纯音乐'},
  {id:'9609530462',name:'华语'},
  {id:'9609530483',name:'日语'},
  {id:'9609530446',name:'Hip-Hop'}
];

function loadPlaylist(id){
  var container=document.getElementById('meting-container');
  container.innerHTML='';
  var el=document.createElement('meting-js');
  el.setAttribute('server','tencent');
  el.setAttribute('type','playlist');
  el.setAttribute('id',id);
  el.setAttribute('api','https://api.injahow.cn/meting/?server=:server&type=:type&id=:id');
  el.setAttribute('mutex','true');
  el.setAttribute('preload','auto');
  el.setAttribute('volume','0.7');
  el.setAttribute('theme','#a8b4c0');
  el.setAttribute('list-folded','false');
  el.setAttribute('list-max-height','340px');
  container.appendChild(el);
  // 更新 tab 状态
  document.querySelectorAll('.pl-tab').forEach(function(t){
    t.classList.toggle('active',t.getAttribute('data-id')===id);
  });
  try{localStorage.setItem('musicPlaylist',id)}catch(e){}
}

// tab 点击事件
document.getElementById('playlist-tabs').addEventListener('click',function(e){
  var tab=e.target.closest('.pl-tab');
  if(!tab)return;
  loadPlaylist(tab.getAttribute('data-id'));
});

// 初始化：恢复上次选择的歌单
(function(){
  var saved=localStorage.getItem('musicPlaylist')||'9609530515';
  loadPlaylist(saved);
})();

// 监听 APlayer 初始化后恢复播放状态
function restoreMusicState(){
  try{
    var ap=document.querySelector('.music-panel .aplayer');
    if(!ap||!ap.aplayer)return;
    var player=ap.aplayer;
    var saved=sessionStorage.getItem('musicState');
    if(saved){
      var state=JSON.parse(saved);
      if(typeof state.index==='number'&&state.index<player.list.audios.length){
        player.list.switch(state.index);
        if(state.time)player.seek(state.time);
        if(state.playing)setTimeout(function(){player.play()},500);
      }
    }
    // 监听播放事件保存状态
    player.on('canplay',function(){saveMusicState(player)});
    player.on('timeupdate',function(){
      if(Math.floor(player.audio.currentTime)%3===0)saveMusicState(player);
    });
    player.on('listswitch',function(){saveMusicState(player)});
  }catch(e){}
}

function saveMusicState(player){
  try{
    sessionStorage.setItem('musicState',JSON.stringify({
      index:player.list.index,
      time:player.audio.currentTime,
      playing:!player.audio.paused
    }));
  }catch(e){}
}

// 页面卸载时保存
window.addEventListener('beforeunload',function(){
  try{
    var ap=document.querySelector('.music-panel .aplayer');
    if(ap&&ap.aplayer)saveMusicState(ap.aplayer);
  }catch(e){}
});

// 等待 MetingJS 初始化完成后恢复
var checkCount=0;
var checkInterval=setInterval(function(){
  var ap=document.querySelector('.music-panel .aplayer');
  if(ap&&ap.aplayer){
    clearInterval(checkInterval);
    restoreMusicState();
  }
  if(++checkCount>30)clearInterval(checkInterval);
},1000);
</script>

<!-- Pjax: 无刷新页面切换 (音乐播放器不中断) -->
<script>
(function(){
  var c = document.querySelector('.container');
  if (!c) return;

  // 进度条
  var bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;top:0;left:0;height:2px;background:#a8b4c0;z-index:999999;width:0;transition:width 0.3s';
  document.body.appendChild(bar);

  function ok(a) {
    if (!a || !a.href) return false;
    if (a.target === '_blank' || a.hasAttribute('download')) return false;
    if (a.hostname !== location.hostname) return false;
    if (a.pathname === location.pathname && a.hash) return false;
    if (/\.(zip|tar|gz|pdf|mp3|mp4|wav|ogg)$/i.test(a.pathname)) return false;
    return true;
  }

  function runScripts(el) {
    var ss = el.querySelectorAll('script');
    for (var i = 0; i < ss.length; i++) {
      var ns = document.createElement('script');
      for (var j = 0; j < ss[i].attributes.length; j++)
        ns.setAttribute(ss[i].attributes[j].name, ss[i].attributes[j].value);
      if (ss[i].textContent) ns.textContent = ss[i].textContent;
      ss[i].parentNode.replaceChild(ns, ss[i]);
    }
  }

  function go(url, push) {
    bar.style.width = '30%';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url + (url.indexOf('?') >= 0 ? '&' : '?') + '_pjax=1', true);
    xhr.setRequestHeader('X-PJAX', 'true');
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        bar.style.width = '80%';
        var doc = new DOMParser().parseFromString(xhr.responseText, 'text/html');
        var nc = doc.querySelector('.container');
        if (nc) {
          c.innerHTML = nc.innerHTML;
          runScripts(c);
          // Re-init Waline after Pjax (module scripts may not re-execute)
          if (typeof window.__reinitWaline === 'function') try{window.__reinitWaline()}catch(e){}
          var t = doc.querySelector('title');
          if (t) document.title = t.textContent;
          if (push !== false) history.pushState({u: url}, '', url);
          window.scrollTo(0, 0);
          if (typeof loadSearchData === 'function') try{loadSearchData()}catch(e){}
          bar.style.width = '100%';
          setTimeout(function(){bar.style.width='0'},300);
        } else { location.href = url; }
      } else { location.href = url; }
    };
    xhr.onerror = function() { location.href = url; };
    xhr.send();
  }

  // 拦截点击
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a');
    if (!a || !ok(a)) return;
    e.preventDefault();
    e.stopPropagation();
    go(a.href);
  });

  // 浏览器前进/后退
  window.addEventListener('popstate', function(e) {
    go(e.state && e.state.u ? e.state.u : location.href, false);
  });

  // 初始化 history state
  history.replaceState({u: location.href}, '', location.href);
})();
</script>

<!-- Service Worker: 自卸载清除旧缓存 -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistration().then(function(reg) {
    if (reg) reg.unregister();
  });
  if (window.caches) caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})});
}
</script>
