{{ define "main" }}
<article class="post">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="gallery-grid">
    {{ range hugo.Data.gallery }}
    <div class="gallery-item">
      <img src="{{ .image }}" alt="{{ .title }}" loading="lazy">
      <div class="gallery-overlay">
        <h4>{{ .title }}</h4>
        <p>{{ .description }}</p>
        {{ if .date }}
        <span class="gallery-date">📅 {{ .date }}</span>
        {{ end }}
      </div>
    </div>
    {{ end }}
  </div>
</article>

<style>
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 1rem;
  margin-top: 2rem;
}

.gallery-item {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 4/3;
  cursor: pointer;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}

.gallery-item:hover img {
  transform: scale(1.05);
}

.gallery-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: white;
  padding: 1rem;
  transform: translateY(100%);
  transition: transform 0.3s;
}

.gallery-item:hover .gallery-overlay {
  transform: translateY(0);
}

.gallery-overlay h4 {
  margin: 0 0 0.25rem 0;
  font-size: 1rem;
}

.gallery-overlay p {
  margin: 0 0 0.25rem 0;
  font-size: 0.85rem;
  opacity: 0.9;
}

.gallery-date {
  font-size: 0.75rem;
  opacity: 0.8;
}
</style>
{{ end }}
