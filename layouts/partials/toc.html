<!-- 文章目录 TOC -->
{{ if and .IsPage .TableOfContents }}
{{ $headers := findRE "<h[1-6].*?>(.|\n]*?)</h[1-6]>" .Content }}
{{ if $headers }}
<div id="toc-container" style="position:fixed;left:20px;top:100px;width:200px;max-height:calc(100vh - 150px);overflow-y:auto;z-index:100;">
    <div style="background:#161616;border:1px solid #222;border-radius:8px;padding:15px;">
        <p style="color:#4ade80;font-size:0.85rem;font-weight:600;margin-bottom:10px;">目录</p>
        <nav id="TableOfContents">
            {{ .TableOfContents }}
        </nav>
    </div>
</div>

<style>
#toc-container {
    display: none;
}
@media (min-width: 1400px) {
    #toc-container {
        display: block;
    }
}
#toc-container ul {
    list-style: none;
    padding: 0;
    margin: 0;
}
#toc-container li {
    margin: 5px 0;
}
#toc-container a {
    color: #888;
    text-decoration: none;
    font-size: 0.8rem;
    transition: color 0.2s;
    display: block;
    padding: 3px 0;
}
#toc-container a:hover,
#toc-container a.active {
    color: #4ade80;
}
#toc-container .toc-h1 { padding-left: 0; }
#toc-container .toc-h2 { padding-left: 10px; }
#toc-container .toc-h3 { padding-left: 20px; }
#toc-container .toc-h4 { padding-left: 30px; }
</style>

<script>
// 高亮当前阅读的章节
window.addEventListener('scroll', function() {
    const headings = document.querySelectorAll('h1, h2, h3, h4');
    const tocLinks = document.querySelectorAll('#toc-container a');
    
    let current = '';
    headings.forEach(heading => {
        const rect = heading.getBoundingClientRect();
        if (rect.top <= 100) {
            current = heading.id;
        }
    });
    
    tocLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === '#' + current) {
            link.classList.add('active');
        }
    });
});
</script>
{{ end }}
{{ end }}
