<!-- 分享按钮 -->
<div class="share-buttons" style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid #222;">
    <p style="color:#888;font-size:0.9rem;margin-bottom:0.8rem;">分享这篇文章：</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <!-- 微信 -->
        <button onclick="shareWeChat()" 
            style="background:#07C160;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.85rem;">
            📱 微信
        </button>
        
        <!-- 微博 -->
        <a href="https://service.weibo.com/share/share.php?title={{ .Title }}&url={{ .Permalink }}" 
            target="_blank" rel="noopener"
            style="background:#E6162D;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.85rem;text-decoration:none;">
            🐦 微博
        </a>
        
        <!-- Twitter -->
        <a href="https://twitter.com/intent/tweet?text={{ .Title }}&url={{ .Permalink }}" 
            target="_blank" rel="noopener"
            style="background:#1DA1F2;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.85rem;text-decoration:none;">
            🐦 Twitter
        </a>
        
        <!-- 复制链接 -->
        <button onclick="copyLink()" 
            style="background:#333;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.85rem;">
            🔗 复制链接
        </button>
    </div>
</div>

<script>
function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
        alert('链接已复制！');
    });
}

function shareWeChat() {
    // 生成微信分享二维码
    const url = encodeURIComponent(window.location.href);
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${url}`;
    
    // 创建模态框
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:2000;';
    modal.innerHTML = `
        <div style="background:#161616;padding:30px;border-radius:12px;text-align:center;">
            <p style="color:white;margin-bottom:15px;">微信扫码分享</p>
            <img src="${qrUrl}" alt="QR Code" style="width:200px;height:200px;">
            <p style="color:#888;font-size:0.8rem;margin-top:15px;">点击空白处关闭</p>
        </div>
    `;
    modal.onclick = () => modal.remove();
    document.body.appendChild(modal);
}
</script>
