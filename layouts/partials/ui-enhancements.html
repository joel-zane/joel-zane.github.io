<!-- 返回顶部按钮 -->
<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" 
    style="position:fixed;bottom:80px;right:20px;width:50px;height:50px;border-radius:50%;background:#a8b4c0;color:#0d0d0d;border:none;cursor:pointer;opacity:0;visibility:hidden;transition:all 0.3s;z-index:1000;font-size:20px;">
    ↑
</button>

<!-- 阅读进度条 -->
<div id="reading-progress" style="position:fixed;top:0;left:0;width:0%;height:3px;background:#a8b4c0;z-index:1000;transition:width 0.1s;"></div>

<script>
// 返回顶部按钮显示/隐藏
window.addEventListener('scroll', function() {
    const btn = document.getElementById('back-to-top');
    const progress = document.getElementById('reading-progress');
    
    // 返回顶部按钮
    if (window.scrollY > 300) {
        btn.style.opacity = '1';
        btn.style.visibility = 'visible';
    } else {
        btn.style.opacity = '0';
        btn.style.visibility = 'hidden';
    }
    
    // 阅读进度条
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrollPercent = (scrollTop / docHeight) * 100;
    progress.style.width = scrollPercent + '%';
});
</script>

<style>
#back-to-top:hover {
    background: #8a9aaa !important;
    transform: scale(1.1);
}
</style>
