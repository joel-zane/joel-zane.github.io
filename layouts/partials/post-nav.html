<!-- 上一篇/下一篇导航 -->
{{ if or .PrevInSection .NextInSection }}
<div class="post-navigation" style="margin-top:3rem;padding-top:2rem;border-top:1px solid #222;">
    <div style="display:flex;justify-content:space-between;gap:20px;">
        {{ if .PrevInSection }}
        <a href="{{ .PrevInSection.RelPermalink }}" style="flex:1;text-decoration:none;">
            <div style="padding:15px;background:#161616;border:1px solid #222;border-radius:8px;transition:border-color 0.3s;" 
                 onmouseover="this.style.borderColor='#4ade80'" onmouseout="this.style.borderColor='#222'">
                <span style="color:#888;font-size:0.8rem;">{{ i18n "prevPost" }}</span>
                <p style="color:white;margin-top:5px;font-size:0.95rem;">{{ .PrevInSection.Title }}</p>
            </div>
        </a>
        {{ else }}
        <div style="flex:1;"></div>
        {{ end }}
        
        {{ if .NextInSection }}
        <a href="{{ .NextInSection.RelPermalink }}" style="flex:1;text-decoration:none;">
            <div style="padding:15px;background:#161616;border:1px solid #222;border-radius:8px;text-align:right;transition:border-color 0.3s;"
                 onmouseover="this.style.borderColor='#4ade80'" onmouseout="this.style.borderColor='#222'">
                <span style="color:#888;font-size:0.8rem;">{{ i18n "nextPost" }}</span>
                <p style="color:white;margin-top:5px;font-size:0.95rem;">{{ .NextInSection.Title }}</p>
            </div>
        </a>
        {{ else }}
        <div style="flex:1;"></div>
        {{ end }}
    </div>
</div>
{{ end }}
