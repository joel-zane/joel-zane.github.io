<footer>
  <div style="display:flex">
    {{ with .Site.Params.social }}
      {{ range . }}
        <a class="soc" href="{{ .url }}" rel="me" title="{{ .name }}">
          <svg class="feather"><use href="/svg/feather-sprite.svg#{{ .icon }}"/></svg>
        </a>
        <a class="border"></a>
      {{ end }}
    {{ end }}
  </div>
  
  {{ if .Site.Params.busuanzi }}
  <div class="busuanzi-stats">
    <span id="busuanzi_container_site_pv">
      👁️ 总访问量: <span id="busuanzi_value_site_pv">-</span> 次
    </span>
    <span style="margin-left: 1.5rem;" id="busuanzi_container_site_uv">
      👤 访客数: <span id="busuanzi_value_site_uv">-</span> 人
    </span>
  </div>
  {{ end }}
  
  <div class="footer-info">
    {{ .Site.Copyright }}
  </div>

  {{ if .Site.Params.busuanzi }}
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  {{ end }}
</footer>

<style>
.busuanzi-stats {
  margin: 0.5rem 0;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
</style>
